<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(160deg, #0d0f1a 0%, #1a1c2e 40%, #1e1b2d 100%);
    font-family: 'Noto Serif JP', serif;
    color: #d4cfc6;
    padding: 2.5rem;
    overflow: hidden;
    position: relative;
  }

  /* 花びら */
  .petal {
    position: absolute;
    width: 12px;
    height: 12px;
    background: radial-gradient(ellipse at 30% 30%, rgba(120, 170, 220, 0.7), rgba(80, 130, 200, 0.3));
    border-radius: 50% 0 50% 0;
    opacity: 0;
    pointer-events: none;
    animation: fall linear infinite;
  }

  .petal:nth-child(1)  { left:  5%; animation-duration: 12s; animation-delay: 0s;   width: 10px; height: 10px; }
  .petal:nth-child(2)  { left: 15%; animation-duration: 15s; animation-delay: 2s;   width: 14px; height: 14px; }
  .petal:nth-child(3)  { left: 25%; animation-duration: 11s; animation-delay: 4s;   width:  9px; height:  9px; }
  .petal:nth-child(4)  { left: 35%; animation-duration: 14s; animation-delay: 1s;   width: 12px; height: 12px; }
  .petal:nth-child(5)  { left: 45%; animation-duration: 13s; animation-delay: 3s;   width: 11px; height: 11px; }
  .petal:nth-child(6)  { left: 55%; animation-duration: 16s; animation-delay: 5s;   width: 13px; height: 13px; }
  .petal:nth-child(7)  { left: 65%; animation-duration: 12s; animation-delay: 2.5s; width: 10px; height: 10px; }
  .petal:nth-child(8)  { left: 75%; animation-duration: 14s; animation-delay: 0.5s; width: 15px; height: 15px; }
  .petal:nth-child(9)  { left: 85%; animation-duration: 11s; animation-delay: 3.5s; width:  8px; height:  8px; }
  .petal:nth-child(10) { left: 92%; animation-duration: 15s; animation-delay: 1.5s; width: 11px; height: 11px; }

  @keyframes fall {
    0% {
      transform: translateY(-20px) rotate(0deg) translateX(0px);
      opacity: 0;
    }
    10% {
      opacity: 0.6;
    }
    90% {
      opacity: 0.4;
    }
    100% {
      transform: translateY(100vh) rotate(360deg) translateX(40px);
      opacity: 0;
    }
  }

  /* 淡い光の粒 */
  body::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      radial-gradient(ellipse 1px 1px at 20% 30%, rgba(120, 170, 220, 0.4), transparent),
      radial-gradient(ellipse 1px 1px at 70% 20%, rgba(100, 150, 210, 0.3), transparent),
      radial-gradient(ellipse 1px 1px at 40% 70%, rgba(120, 160, 220, 0.3), transparent),
      radial-gradient(ellipse 1px 1px at 80% 60%, rgba(100, 140, 210, 0.2), transparent),
      radial-gradient(ellipse 1px 1px at 10% 80%, rgba(110, 160, 200, 0.3), transparent);
    animation: drift 20s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(15px, -10px); }
  }

  .quote-container {
    max-width: 560px;
    text-align: center;
    position: relative;
    z-index: 1;
    animation: fadeIn 2s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .quote-mark {
    font-size: 2.5rem;
    color: rgba(120, 170, 220, 0.25);
    margin-bottom: 0.5rem;
    font-family: Georgia, serif;
  }

  .quote-text {
    font-size: 1.05rem;
    font-weight: 300;
    line-height: 2;
    letter-spacing: 0.04em;
    color: #d4cfc6;
    margin-bottom: 1.2rem;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: rgba(120, 170, 220, 0.3);
    margin: 0 auto 1rem;
  }

  .quote-author {
    font-size: 0.8rem;
    font-weight: 300;
    color: rgba(120, 170, 220, 0.5);
    letter-spacing: 0.15em;
  }
</style>
</head>
<body>

<!-- 花びら10枚 -->
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>

<div class="quote-container">
  <div class="quote-mark">❝</div>
  <p class="quote-text" id="quote"></p>
  <div class="divider"></div>
  <p class="quote-author" id="author"></p>
</div>

<script>
const quotes = [
  { text: "人間の寿命は短いのに、\nなんでもっと知ろうとしなかったんだろう。", author: "フリーレン" },
  { text: "想いっていうのは\n言葉にしないと伝わらないのに。", author: "フリーレン" },
  { text: "まだたったの10年だよ。\n今会いに行かないと近い未来に後悔するよ。", author: "フリーレン" },
  { text: "尻尾を巻いて逃げ出すっていう作戦は、\n別に今じゃなくても使えるからね。", author: "フリーレン" },
  { text: "隠している訳ではないよ。\n確信がないだけだ。", author: "フリーレン" },
  { text: "私は今の話をしているんだよ。", author: "フリーレン" },
  { text: "時間の無駄だからね。", author: "フリーレン" },
  { text: "正直興味はないよ。\nだから見て確かめるんだ。", author: "フリーレン" },
  { text: "人を騙すっていうのはね、\nとびきりの笑顔で成し遂げるものなんだよ。", author: "フリーレン" },
  { text: "今更知ったところで\nもう関係ないことばかりだ。\nでも、知りたいと思ったんだ。", author: "フリーレン" },
  { text: "探し物をしているんだ。\nまだ見つかっていない魔法をね。", author: "フリーレン" },
  { text: "私の集めた魔法を褒めてくれた馬鹿がいた。\nそれだけだよ。", author: "フリーレン" },
  { text: "必死に積み上げてきたものは\n決して裏切りません。", author: "フェルン" },
  { text: "心の支えが必要なのは\n子供だけじゃない。", author: "ヒンメル" },
  { text: "人はどうでもいいことに命を懸けない。", author: "ヒンメル" },
];

const pick = quotes[Math.floor(Math.random() * quotes.length)];
document.getElementById("quote").innerHTML = pick.text.replace(/\n/g, '<br>');
document.getElementById("author").textContent = `— ${pick.author}`;
</script>
</body>
</html>
